<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="apple-touch-icon" href="/icon-180.png" />

<title>Tonight's Mic</title>
<style>
  :root{
    --bg:#0b0b0e; --bg2:#15151b; --bg3:#1d1d25;
    --line:#2a2a34;
    --amber:#ff9e2c; --amber-soft:#ffc06b;
    --cyan:#22d3ee; --cyan-soft:#7fe6f5; --orange:#ff6b35; --green:#4ade80; --pink:#ff5c8a;
    --text:#f5f3ee; --muted:#9a9aa6;
    --glow-amber:0 0 24px rgba(255,158,44,.45);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(120% 60% at 50% -10%, rgba(255,158,44,.10), transparent 60%),
      radial-gradient(90% 50% at 90% 110%, rgba(34,211,238,.08), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Segoe UI",Roboto,sans-serif;
    min-height:100dvh;
    padding:max(18px,env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom));
    max-width:520px;margin:0 auto;
  }
  .brand{text-align:center;margin:6px 0 14px}
  .brand h1{margin:0;font-size:clamp(28px,8.5vw,40px);font-weight:900;letter-spacing:2px;color:var(--amber);text-shadow:var(--glow-amber);line-height:1}
  .brand h1 .m{color:var(--cyan);text-shadow:0 0 24px rgba(34,211,238,.45)}
  .brand p{margin:6px 0 0;color:var(--muted);font-size:12px;letter-spacing:3px;font-weight:700}
  .fire{background:linear-gradient(180deg,var(--bg2),var(--bg));border:1px solid var(--line);border-radius:18px;padding:14px 16px;margin-bottom:14px;display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center}
  .fire .big{display:flex;align-items:baseline;gap:6px}
  .fire .flame{font-size:30px;filter:drop-shadow(0 0 10px rgba(255,107,53,.6))}
  .fire .num{font-size:clamp(40px,13vw,56px);font-weight:900;line-height:.9;color:var(--amber);text-shadow:var(--glow-amber)}
  .fire .num.cold{color:var(--muted);text-shadow:none}
  .fire .flame.cold{filter:grayscale(1) opacity(.5)}
  .fire .meta .unit{font-size:12px;color:var(--muted);font-weight:700;margin-top:2px}
  .fire .side{text-align:right;font-size:12px;color:var(--muted);line-height:1.7}
  .fire .side b{color:var(--text);font-weight:800}
  .fire .today{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:999px;font-weight:800;font-size:12px}
  .fire .today.done{background:rgba(74,222,128,.14);color:var(--green)}
  .fire .today.todo{background:rgba(255,158,44,.14);color:var(--amber-soft)}
  /* calendar */
  .cal{background:var(--bg2);border:1px solid var(--line);border-radius:18px;padding:14px 14px 16px;margin-bottom:16px}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cal-head .mlabel{font-size:15px;font-weight:900;letter-spacing:.5px}
  .cal-nav{background:var(--bg3);border:1px solid var(--line);color:var(--text);width:34px;height:34px;border-radius:10px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .cal-nav:active{background:#26262f}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .cal-dow{text-align:center;font-size:11px;font-weight:800;color:var(--muted);padding:2px 0}
  .cal-dow.sat{color:var(--cyan-soft)} .cal-dow.sun{color:var(--pink)}
  .cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:13px;font-weight:700;color:var(--text);background:var(--bg3);cursor:pointer;position:relative;transition:transform .06s}
  .cal-cell:active{transform:scale(.92)}
  .cal-cell.empty{background:none;cursor:default}
  .cal-cell.sat{color:var(--cyan-soft)} .cal-cell.sun{color:var(--pink)}
  .cal-cell.done{background:var(--amber);color:#231400;font-weight:900}
  .cal-cell.done.sat,.cal-cell.done.sun{color:#231400}
  .cal-cell.today{box-shadow:0 0 0 2px var(--cyan)}
  .cal-cell.future{opacity:.32;cursor:default}
  .cal-legend{display:flex;gap:14px;justify-content:center;margin-top:12px;font-size:11px;color:var(--muted)}
  .cal-legend span{display:inline-flex;align-items:center;gap:5px}
  .cal-legend .dot{width:11px;height:11px;border-radius:3px;display:inline-block}
  .cal-legend .dot.done{background:var(--amber)} .cal-legend .dot.ring{box-shadow:inset 0 0 0 2px var(--cyan)}
  .cal-tip{text-align:center;font-size:11px;color:#5a5a66;margin-top:8px}
  .gacha{width:100%;border:none;cursor:pointer;background:linear-gradient(180deg,var(--amber),#e97e11);color:#231400;font-weight:900;letter-spacing:1px;font-size:19px;padding:20px;border-radius:18px;box-shadow:0 10px 30px rgba(255,158,44,.28),inset 0 1px 0 rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .08s ease, box-shadow .2s ease}
  .gacha:active{transform:translateY(2px) scale(.99);box-shadow:0 4px 14px rgba(255,158,44,.3)}
  .gacha .mic{font-size:22px}
  .gacha.rolling{animation:pulse .5s ease}
  @keyframes pulse{0%{transform:scale(1)}40%{transform:scale(1.03)}100%{transform:scale(1)}}
  .hint{text-align:center;color:var(--muted);font-size:12px;margin:10px 0 0}
  .card{margin-top:18px;background:var(--bg2);border:1px solid var(--line);border-radius:20px;padding:18px;opacity:0;transform:translateY(10px);transition:opacity .3s ease,transform .3s ease}
  .card.show{opacity:1;transform:none}
  .card .tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:900;letter-spacing:1.5px;padding:5px 11px;border-radius:999px;border:1px solid currentColor;margin-bottom:12px}
  .card h2{margin:0;font-size:clamp(22px,6.5vw,28px);font-weight:900;line-height:1.15}
  .card .ja-title{margin:5px 0 0;color:var(--muted);font-size:14px;font-weight:600}
  .sep{height:1px;background:var(--line);margin:16px 0}
  .block .lbl{font-size:12px;font-weight:900;letter-spacing:1px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .quote{background:var(--bg3);border-left:3px solid var(--amber);border-radius:0 12px 12px 0;padding:13px 14px;font-size:16px;line-height:1.5;font-weight:600}
  .quote.cyan{border-left-color:var(--cyan)}
  .copy{margin-top:10px;width:100%;border:1px solid var(--amber);background:rgba(255,158,44,.10);color:var(--amber-soft);font-weight:800;font-size:14px;padding:12px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .15s}
  .copy:active{background:rgba(255,158,44,.22)}
  .copy.ok{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.12)}
  .ja-toggle{margin-top:9px;background:none;border:1px solid var(--line);color:var(--muted);font-size:12px;font-weight:700;padding:7px 13px;border-radius:999px;cursor:pointer;transition:background .15s}
  .ja-toggle:active{background:var(--bg3)}
  .ja-text{margin-top:9px;font-size:14px;color:var(--amber-soft);line-height:1.55;padding:0 2px;display:none}
  .ja-text.cyan{color:var(--cyan-soft)}
  .ja-text.show{display:block}
  .voice{margin-top:16px;width:100%;border:none;cursor:pointer;background:linear-gradient(180deg,var(--cyan),#0bb6d4);color:#00252b;font-weight:900;font-size:16px;letter-spacing:.3px;padding:16px;border-radius:14px;box-shadow:0 8px 22px rgba(34,211,238,.25);display:flex;align-items:center;justify-content:center;gap:9px;transition:transform .08s}
  .voice:active{transform:translateY(2px)}
  .voice-note{text-align:center;color:var(--muted);font-size:11px;margin:8px 0 0;line-height:1.5}
  .toast{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);background:#111;border:1px solid var(--green);color:var(--green);padding:11px 18px;border-radius:999px;font-weight:800;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:50;max-width:90%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .foot{text-align:center;color:#5a5a66;font-size:11px;margin-top:22px;letter-spacing:.5px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  :focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
</style>
</head>
<body>
  <div class="brand">
    <h1>TONIGHT'S <span class="m">MIC</span></h1>
    <p>寝る前の一本 · 5 MIN VOICE</p>
  </div>

  <div class="fire" id="fire">
    <div class="big">

      <span class="num" id="streakNum">0</span>
      <div class="meta"><div class="unit">日連続</div></div>
    </div>

  </div>

  <div class="cal">
    <div class="cal-head">
      <button class="cal-nav" id="prevM" aria-label="前の月">&#8249;</button>
      <div class="mlabel" id="mlabel"></div>
      <button class="cal-nav" id="nextM" aria-label="次の月">&#8250;</button>
    </div>
    <div class="cal-grid" id="dowRow"></div>
    <div class="cal-grid" id="calGrid" style="margin-top:5px"></div>

  <button class="gacha" id="gacha" aria-label="今夜のテーマを引く">
    <span class="mic">&#127908;</span><span id="gachaLabel">PULL TONIGHT'S THEME</span>
  </button>
  <p class="hint">ボタンで今夜のお題ガチャ → 英語で5分話す</p>

  <div class="card" id="card" hidden>
    <span class="tag" id="tag"></span>
    <h2 id="title"></h2>
    <p class="ja-title" id="jaTitle"></p>
    <div class="sep"></div>
    <div class="block">
      <div class="lbl">&#127908; YOUR OPENER — これを口火に</div>
      <div class="quote" id="opener"></div>
      <button class="copy" id="copy"><span id="copyLabel">&#128203; コピーして口火にする</span></button>
      <button class="ja-toggle" id="openerJaBtn">&#127471;&#127477; 日本語を見る</button>
      <div class="ja-text" id="openerJa"></div>
    </div>
    <div class="sep"></div>
    <div class="block">
      <div class="lbl">&#128172; GPT WILL ASK — こう返ってくる</div>
      <div class="quote cyan" id="q"></div>
      <button class="ja-toggle" id="qJaBtn">&#127471;&#127477; 日本語を見る</button>
      <div class="ja-text cyan" id="qJa"></div>
    </div>
    <button class="voice" id="voice">&#128483;&#65039; ChatGPT に投げる →</button>
    <p class="voice-note">押すとお題入りでChatGPTが開く（保険でコピーも済み）<br>送信 → 音声アイコンでそのまま会話へ／空で開いたら貼るだけ</p>
  </div>

  <div class="foot">Ask GPT to fix your English after · 記録は端末に保存</div>
  <div class="toast" id="toast">Copied</div>

var mem={};
var store={
  get:function(k){try{return localStorage.getItem(k)}catch(e){return (k in mem)?mem[k]:null}},
  set:function(k,v){try{localStorage.setItem(k,v)}catch(e){mem[k]=v}}
};
function pad(n){return String(n).padStart(2,'0')}
function dstr(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function parse(s){var p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
var today=dstr(new Date());

/* day set (source of truth) */
function loadDays(){
  var raw=store.get('tm_days');
  var arr=[];
  if(raw){try{arr=JSON.parse(raw)||[]}catch(e){arr=[]}}
  // migrate old single-day record if present
  var last=store.get('tm_last');
  if(last && arr.indexOf(last)<0) arr.push(last);
  return arr;
}
var daySet=(function(){var s={};loadDays().forEach(function(d){s[d]=1});return s})();
function saveDays(){store.set('tm_days',JSON.stringify(Object.keys(daySet)))}
function hasDay(d){return !!daySet[d]}
function addDay(d){if(!daySet[d]){daySet[d]=1;saveDays()}}
function toggleDay(d){if(daySet[d]){delete daySet[d]}else{daySet[d]=1}saveDays()}

function computeStreak(){
  var cur=new Date();
  if(!hasDay(today)) cur.setDate(cur.getDate()-1);
  var s=0;
  while(hasDay(dstr(cur))){s++;cur.setDate(cur.getDate()-1)}
  return s;
}
function computeBest(){
  var keys=Object.keys(daySet).sort();
  var best=0,run=0,prev=null;
  keys.forEach(function(k){
    if(prev){
      var pd=parse(prev),cd=parse(k);
      var diff=Math.round((cd-pd)/86400000);
      run=(diff===1)?run+1:1;
    }else run=1;
    if(run>best)best=run;
    prev=k;
  });
  return best;
}

function $(id){return document.getElementById(id)}

function renderFire(){
  var streak=computeStreak();
  var done=hasDay(today);
  $('streakNum').textContent=streak;
  $('streakNum').classList.toggle('cold',streak===0);
  $('flame').classList.toggle('cold',streak===0);
  $('totalDays').textContent=Object.keys(daySet).length;
  $('bestStreak').textContent=computeBest();
  var b=$('todayBadge');
  if(done){b.className='today done';b.textContent='今夜は\u2713済み'}
  else{b.className='today todo';b.textContent='今夜はまだ'}
}

/* calendar */
var viewD=new Date(); viewD.setDate(1);
var DOW=['月','火','水','木','金','土','日'];
function buildDow(){
  var r=$('dowRow');r.innerHTML='';
  DOW.forEach(function(d,i){
    var c=document.createElement('div');
    c.className='cal-dow'+(i===5?' sat':i===6?' sun':'');
    c.textContent=d;r.appendChild(c);
  });
}
function renderCal(){
  $('mlabel').textContent=viewD.getFullYear()+'年'+(viewD.getMonth()+1)+'月';
  var grid=$('calGrid');grid.innerHTML='';
  var y=viewD.getFullYear(),m=viewD.getMonth();
  var first=new Date(y,m,1);
  var offset=(first.getDay()+6)%7; // Mon=0
  var dim=new Date(y,m+1,0).getDate();
  for(var i=0;i<offset;i++){
    var e=document.createElement('div');e.className='cal-cell empty';grid.appendChild(e);
  }
  for(var d=1;d<=dim;d++){
    var ds=y+'-'+pad(m+1)+'-'+pad(d);
    var dowIdx=(new Date(y,m,d).getDay()+6)%7;
    var cell=document.createElement('div');
    cell.className='cal-cell'+(dowIdx===5?' sat':dowIdx===6?' sun':'');
    cell.textContent=d;
    if(hasDay(ds))cell.classList.add('done');
    if(ds===today)cell.classList.add('today');
    if(ds>today)cell.classList.add('future');
    else{
      (function(dstrLocal){
        cell.addEventListener('click',function(){
          toggleDay(dstrLocal);renderCal();renderFire();
          toast(hasDay(dstrLocal)?'記録した \u2713':'取り消した');
        });
      })(ds);
    }
    grid.appendChild(cell);
  }
}
$('prevM').addEventListener('click',function(){viewD.setMonth(viewD.getMonth()-1);renderCal()});
$('nextM').addEventListener('click',function(){viewD.setMonth(viewD.getMonth()+1);renderCal()});

function resetJa(){
  $('openerJa').classList.remove('show');$('openerJaBtn').innerHTML='\uD83C\uDDEF\uD83C\uDDF5 日本語を見る';
  $('qJa').classList.remove('show');$('qJaBtn').innerHTML='\uD83C\uDDEF\uD83C\uDDF5 日本語を見る';
}
function resetCopy(){$('copy').classList.remove('ok');$('copyLabel').innerHTML='\uD83D\uDCCB コピーして口火にする'}

var lastIdx=-1;var card=$('card');
function roll(){
  var i;do{i=Math.floor(Math.random()*THEMES.length)}while(i===lastIdx&&THEMES.length>1);
  lastIdx=i;var t=THEMES[i];var c=CATS[t.cat];
  var tag=$('tag');tag.style.color=c.color;tag.textContent=c.emoji+' '+c.label;
  $('title').textContent=t.title;
  $('jaTitle').textContent=t.ja;
  $('opener').textContent='\u201C'+t.opener+'\u201D';
  $('opener').dataset.raw=t.opener;
  $('openerJa').textContent=t.oja;
  $('q').textContent='\u201C'+t.q+'\u201D';
  $('q').dataset.raw=t.q;
  $('qJa').textContent=t.qja;
  resetCopy();resetJa();
  card.hidden=false;
  requestAnimationFrame(function(){card.classList.add('show')});
  addDay(today);renderFire();renderCal();
  $('gachaLabel').textContent='PULL AGAIN';
}
var g=$('gacha');
g.addEventListener('click',function(){
  g.classList.remove('rolling');void g.offsetWidth;g.classList.add('rolling');
  card.classList.remove('show');
  setTimeout(roll,120);
});

function toast(msg){var t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},1800)}
function copyText(txt){
  return navigator.clipboard.writeText(txt).then(function(){return true}).catch(function(){
    try{var ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();return true}catch(e){return false}
  });
}
$('copy').addEventListener('click',function(){
  var raw=$('opener').dataset.raw||'';
  copyText(raw).then(function(ok){
    if(ok){$('copy').classList.add('ok');$('copyLabel').innerHTML='\u2713 コピーした';toast('Copied \u2713')}
    else toast('コピー失敗…手動でどうぞ');
  });
});
function toggleJa(btnId,elId){
  var el=$(elId),btn=$(btnId);
  var show=el.classList.toggle('show');
  btn.innerHTML=show?'\uD83C\uDDEF\uD83C\uDDF5 訳を隠す':'\uD83C\uDDEF\uD83C\uDDF5 日本語を見る';
}
$('openerJaBtn').addEventListener('click',function(){toggleJa('openerJaBtn','openerJa')});
$('qJaBtn').addEventListener('click',function(){toggleJa('qJaBtn','qJa')});
$('voice').addEventListener('click',function(){
  var op=$('opener').dataset.raw||'';
  var qq=$('q').dataset.raw||'';
  var prompt="Let's chat in English for about 5 minutes. Be my casual conversation partner: keep replies short and natural, keep asking me questions, and gently correct my English mistakes as we go. Here's my opener: \""+op+"\" React to it, then ask me: \""+qq+"\"";
  copyText(prompt).then(function(){
    toast('ChatGPTへ \u2713 · 空で開いたら貼るだけ');
    setTimeout(function(){location.href='https://chatgpt.com/?q='+encodeURIComponent(prompt)},500);
  });
});

buildDow();renderCal();renderFire();
</script>
