name: Apply Flowz v2.1 conversation rules

on:
  push:
    branches:
      - agent/flowz-conversation-rules

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/flowz-conversation-rules

      - name: Patch Flowz
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")

          replacements = [
              (
                  '''  <p class="c-note">タップ → 送信 → 音声モードへ／終わる時は "Wrap up!" って言うとまとめが出る</p>''',
                  '''  <p class="c-note">タップ → 送信 → 音声モードへ／訂正は約2回シャドーイング／終了は "Wrap up!"</p>''',
              ),
              (
                  '''  <div class="foot">Say "Wrap up!" to finish · 記録は端末に保存<br>Flowz v2（旧 MIC CHECK）· 2026.07.15</div>''',
                  '''  <div class="foot">Say "Wrap up!" to finish · 記録は端末に保存<br>Flowz v2.1 · 2026.07.17</div>''',
              ),
              (
                  '''  return "You are my English conversation partner. I'm a Japanese beginner — I understand simple English but I'm still slow at building sentences. Rules: 1) Interview me: ask one short, easy question at a time, and always end your turn with exactly one question. 2) Keep each reply to two short sentences plus your question, common everyday words only. 3) Never make me repeat sentences after you — no drills, no long grammar lessons. 4) If I make a mistake, say the corrected sentence in one short line, then move on. 5) If you don't get what I said, guess and check with 'You mean ...?'. 6) Naturally get me to use this phrase at least twice: \""+ph.en+"\". 7) When I say 'Wrap up', finish with: my top 3 mistakes fixed, one better version of something I said, and today's phrase one more time. After your first reply I'll switch to voice mode, so keep everything short and spoken-style. ";''',
                  '''  return "You are my English conversation partner. I'm a Japanese beginner — I understand simple English but I'm still slow at building sentences. Keep the conversation natural, quick, and spoken-style. Rules: 1) Ask at most one short, easy question at a time. Do not interview me or keep firing follow-up questions. Sometimes react or talk for 2–4 simple sentences so I can practice listening. 2) Use common everyday words. Keep most turns short, but do not become silent or abrupt. 3) When I make a useful mistake, reply with only the corrected English sentence — no explanation, praise, label, or question. If it is long, split it into two short parts. 4) Give me about two chances to shadow the correction. While I repeat it, answer only with the same corrected sentence. Do not add a new question until I finish or clearly move on. 5) Do not correct every small mistake; keep the conversation flowing. 6) If you don't get what I said, guess and check with 'You mean ...?'. 7) Naturally help me use this phrase at least twice: \""+ph.en+"\". 8) If I pause or go quiet, stay available and do not end the conversation. 9) When I say 'Wrap up', finish with: my top 3 mistakes fixed, one better version of something I said, and today's phrase one more time. After your first reply I'll switch to voice mode. ";''',
              ),
              (
                  '''   lead:function(t){return "First, ask me about my plan for today. When that runs dry, switch to this topic — ask me: \""+t.q+"\""},''',
                  '''   lead:function(t){return "Start by asking me about my plan for today. When that runs dry, move naturally to this topic: \""+t.q+"\""},''',
              ),
              (
                  '''   lead:function(t){return "First, ask me how my day went. When that runs dry, switch to this topic — ask me: \""+t.q+"\""},''',
                  '''   lead:function(t){return "Start by asking me how my day went. When that runs dry, move naturally to this topic: \""+t.q+"\""},''',
              ),
              (
                  '''   lead:function(){return "Rapid mode: skip rule 4 for now. Fire very easy questions about my everyday life at me, one at a time — I answer fast, speed over accuracy. After 10 questions, pause and give me my top 3 fixes, then keep going if I'm still here."},''',
                  '''   lead:function(){return "Rapid mode: do not correct me during the questions. Ask 10 very easy questions about everyday life, one at a time. I answer fast — speed over accuracy. After question 10, give my top 3 corrected sentences one at a time using the shadowing rules, then keep going if I'm still here."},''',
              ),
              (
                  '''   lead:function(t){return "Interview me about this topic — start by asking: \""+t.q+"\""},''',
                  '''   lead:function(t){return "Have a natural conversation with me about this topic. Start with: \""+t.q+"\""},''',
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one match, found {count}: {old[:80]}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Validate JavaScript
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text = Path("index.html").read_text(encoding="utf-8")
          script = re.search(r"<script>(.*)</script>", text, re.S)
          if not script:
              raise SystemExit("script block not found")
          Path("/tmp/flowz.js").write_text(script.group(1), encoding="utf-8")
          PY
          node --check /tmp/flowz.js

      - name: Commit Flowz v2.1
        shell: bash
        run: |
          rm .github/workflows/flowz-v2-1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/flowz-v2-1.yml
          git commit -m "update Flowz conversation rules"
          git push origin HEAD:agent/flowz-conversation-rules
